services:
  postgres:
    image: postgres:17-alpine
    container_name: svelte5_saas_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: svelte5_saas
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d svelte5_saas']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
